<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu diagnóstico · Eleva Lab</title>
<script>
  (function () {
    const tema = localStorage.getItem('eleva_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="icon" type="image/png" href="../assets/img/logo.png">
<style>
  body { padding-bottom: 40px; }
  .encabezado { display: flex; align-items: center; gap: 10px; padding: 16px 20px; }
  .encabezado img { width: 26px; height: 26px; border-radius: 50%; }
  .encabezado span { font-size: 14px; font-weight: 500; }

  .contenido { max-width: 560px; margin: 0 auto; padding: 10px 20px; }
  .contenido h1 { margin-bottom: 6px; }
  .contenido > p.muted { margin-bottom: 24px; }

  .urgencia-badge {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid var(--border-strong); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 6px;
  }
  .urgencia-label { font-size: 13px; color: var(--text-secondary); }
  .urgencia-valor { font-size: 16px; font-weight: 700; }
  .urgencia-nota { font-size: 12px; margin-bottom: 24px; }

  .categoria { margin-bottom: 20px; }
  .categoria-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
  .categoria-header .valor { font-weight: 500; }
  .barra { height: 8px; border-radius: 4px; background: var(--bg-card-alt); overflow: hidden; }
  .barra .relleno { height: 100%; background: var(--accent); transition: width .4s; }

  .oportunidades { margin-top: 28px; }
  .oportunidades ul { list-style: none; }
  .oportunidades li {
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    display: flex; gap: 8px;
  }
  .oportunidades li:last-child { border-bottom: none; }

  .gracias { margin-top: 32px; text-align: center; }
</style>
</head>
<body>

<div class="encabezado">
  <img src="../assets/img/logo.png" alt="Eleva Lab">
  <span>ELEVA LAB</span>
</div>

<div class="contenido">
  <h1>Tu diagnóstico</h1>
  <p class="muted">Un pantallazo simple de cómo está tu negocio hoy.</p>

  <div id="urgencia"></div>

  <div id="categorias"></div>

  <div class="oportunidades">
    <h2>Oportunidades de mejora</h2>
    <ul id="listaOportunidades"></ul>
  </div>

  <div class="gracias">
    <p class="muted">Gracias por completar el diagnóstico — nos ayuda mucho a entender qué necesitan los pequeños negocios.</p>
  </div>
</div>

<script src="resultado.js"></script>
</body>
</html>
