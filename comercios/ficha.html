<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de comercio · Eleva Lab</title>
<script>
  (function () {
    const tema = localStorage.getItem('eleva_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="icon" type="image/png" href="../assets/img/logo.png">
<style>
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
  }
  .seccion { margin-top: 20px; }
  .seccion h3 { margin-bottom: 12px; }

  .fotos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 12px; }
  .foto-item { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 1; border: 1px solid var(--border); }
  .foto-item img { width: 100%; height: 100%; object-fit: cover; }
  .foto-item button {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
    padding: 0; border-radius: 50%; font-size: 11px; line-height: 1;
    background: rgba(0,0,0,0.6); color: #fff; border: none;
  }

  .fila-auditoria {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px;
  }
  .fila-auditoria:last-child { border-bottom: none; }
  .fila-auditoria > a {
    flex: 1; display: flex; justify-content: space-between; align-items: center;
    text-decoration: none; color: inherit; min-width: 0;
  }
  .fila-auditoria > a:hover { opacity: 0.8; text-decoration: none; }
  .fila-auditoria .der { display: flex; align-items: center; gap: 10px; }
  .btnEliminarAuditoria {
    flex-shrink: 0; width: 26px; height: 26px; padding: 0; border-radius: 50%;
    font-size: 12px; line-height: 1; background: rgba(0,0,0,0.15); color: inherit;
    border: none; cursor: pointer;
  }
  .btnEliminarAuditoria:hover { background: rgba(200,50,50,0.35); }
</style>
</head>
<body>

<div id="nav-top"></div>

<div class="container" style="padding-top: 24px; max-width: 800px; padding-bottom: 40px;">
  <div class="flex-between" style="margin-bottom: 4px;">
    <h1 id="tituloComercio">Cargando...</h1>
    <a href="index.html">← volver</a>
  </div>
  <p class="muted" id="subtituloComercio"></p>

  <div class="mensaje-error" id="msgError"></div>

  <form id="formFicha">

    <div class="card seccion">
      <h3>Datos generales</h3>
      <div class="form-grid">
        <div class="campo"><label>Nombre *</label><input type="text" id="nombre" required></div>
        <div class="campo"><label>Rubro *</label><input type="text" id="rubro" required></div>
        <div class="campo"><label>Dirección</label><input type="text" id="direccion"></div>
        <div class="campo">
          <label>Teléfono</label>
          <div class="campo-con-link">
            <input type="text" id="telefono">
            <a href="#" id="enlace-telefono" class="link-abrir" target="_blank" rel="noopener" style="display:none;" title="Llamar">↗</a>
          </div>
        </div>
        <div class="campo">
          <label>WhatsApp</label>
          <div class="campo-con-link">
            <input type="text" id="whatsapp">
            <a href="#" id="enlace-whatsapp" class="link-abrir" target="_blank" rel="noopener" style="display:none;" title="Abrir WhatsApp">↗</a>
          </div>
        </div>
        <div class="campo">
          <label>Instagram</label>
          <div class="campo-con-link">
            <input type="text" id="instagram">
            <a href="#" id="enlace-instagram" class="link-abrir" target="_blank" rel="noopener" style="display:none;" title="Abrir Instagram">↗</a>
          </div>
        </div>
        <div class="campo">
          <label>Facebook</label>
          <div class="campo-con-link">
            <input type="text" id="facebook">
            <a href="#" id="enlace-facebook" class="link-abrir" target="_blank" rel="noopener" style="display:none;" title="Abrir Facebook">↗</a>
          </div>
        </div>
        <div class="campo">
          <label>Sitio web</label>
          <div class="campo-con-link">
            <input type="text" id="sitioweb">
            <a href="#" id="enlace-sitioweb" class="link-abrir" target="_blank" rel="noopener" style="display:none;" title="Abrir sitio web">↗</a>
          </div>
        </div>
        <div class="campo" style="grid-column:1/-1;">
          <label>Google Maps (link)</label>
          <div class="campo-con-link">
            <input type="text" id="maps">
            <a href="#" id="enlace-maps" class="link-abrir" target="_blank" rel="noopener" style="display:none;" title="Abrir en Google Maps">↗</a>
          </div>
        </div>
      </div>
      <style>
        .campo-con-link { display:flex; align-items:center; gap:6px; }
        .campo-con-link input { flex:1; }
        .campo-con-link .link-abrir {
          flex-shrink:0; display:flex; align-items:center; justify-content:center;
          width:34px; height:34px; border-radius:6px; text-decoration:none;
          font-size:16px; background:var(--color-primario,#7a5c3a); color:#fff;
        }
        .campo-con-link .link-abrir:hover { opacity:0.85; }
      </style>
    </div>

    <div class="card seccion">
      <h3>Oportunidades y seguimiento</h3>
      <div class="campo"><label>Observaciones</label><textarea id="observaciones" rows="2"></textarea></div>
      <div class="campo"><label>Problemas encontrados</label><textarea id="problemas" rows="2"></textarea></div>
      <div class="campo"><label>Servicios sugeridos</label><textarea id="servicios" rows="2"></textarea></div>

      <div class="form-grid">
        <div class="campo">
          <label>Prioridad</label>
          <select id="prioridad">
            <option value="">Sin definir</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
        <div class="campo">
          <label>Estado</label>
          <select id="estado">
            <option value="Nuevo">Nuevo</option>
            <option value="Contactado">Contactado</option>
            <option value="En seguimiento">En seguimiento</option>
            <option value="Cliente">Cliente</option>
            <option value="Descartado">Descartado</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card seccion">
      <h3>Fotos</h3>
      <input type="file" id="inputFoto" accept="image/*">
      <div class="fotos-grid" id="fotosGrid"></div>
    </div>

    <div class="flex gap-sm" style="margin-top: 20px;">
      <button type="submit" class="btn-primary" id="btnGuardar">Guardar cambios</button>
    </div>
  </form>

  <div class="card seccion">
    <div class="flex-between" style="margin-bottom: 8px;">
      <h3 style="margin-bottom:0;">Inspecciones Iniciales</h3>
      <button type="button" class="btn btn-primary" id="btnIniciarInspeccion">Inspección Inicial</button>
    </div>
    <p class="muted" style="margin-bottom: 10px;">Evaluación rápida (2 a 5 min). No reemplaza la Auditoría completa.</p>
    <div id="listaInspecciones">
      <p class="muted">Cargando...</p>
    </div>
  </div>

  <div class="card seccion">
    <div class="flex-between" style="margin-bottom: 8px;">
      <h3 style="margin-bottom:0;">Auditorías</h3>
      <button type="button" class="btn btn-primary" id="btnIniciarAuditoria">+ Iniciar nueva auditoría</button>
    </div>
    <p class="muted" style="margin-bottom: 10px;">Historial de evaluaciones digitales de este comercio.</p>
    <div id="listaAuditorias">
      <p class="muted">Cargando...</p>
    </div>
  </div>
</div>

<div id="nav-bottom"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
  requireAuth('../index.html');
  renderNav('comercios', '../');
</script>
<script src="ficha.js"></script>
</body>
</html>
