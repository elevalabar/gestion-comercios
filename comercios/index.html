<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercios · Eleva Lab</title>
<script>
  (function () {
    const tema = localStorage.getItem('eleva_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="icon" type="image/png" href="../assets/img/logo.png">
<style>
  /* ── Cabecera de métricas rápidas ──────────────────────────── */
  .stats-header {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .stat-card {
    background: var(--bg-card-alt);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-card p.stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-card p.stat-valor { font-size: 24px; font-weight: 500; color: var(--text-primary); }

  /* ── Barra de filtros ──────────────────────────────────────── */
  .filtros-barra {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .filtros-barra input[type="text"] { flex: 2; min-width: 200px; }
  .filtros-barra select { flex: 1; min-width: 130px; }

  /* ── Grid de tarjetas ──────────────────────────────────────── */
  .grid-comercios {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .grid-comercios p.muted { grid-column: 1 / -1; }

  .tarjeta-comercio {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  }
  .tarjeta-comercio:hover {
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .tc-cabecera { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .tc-nombre { font-size: 18px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
  .tc-rubro { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .tc-badge-servicio { display: flex; align-items: center; gap: 6px; flex-shrink: 0; white-space: nowrap; }
  .tc-punto { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .tc-punto-ok      { background: var(--success); }
  .tc-punto-alerta  { background: var(--warning); }
  .tc-punto-alto    { background: var(--danger); }
  .tc-punto-neutro  { background: var(--text-muted); }
  .tc-badge-servicio span.tc-label-servicio { font-size: 12px; color: var(--text-secondary); }

  .tc-localidad {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-secondary);
    margin-top: 18px;
  }
  .tc-localidad svg { flex-shrink: 0; }

  .tc-canales { display: flex; gap: 8px; margin-top: 18px; }
  .tc-canal {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tc-canal-inactivo { background: var(--bg-card-alt); color: var(--text-muted); }
  .tc-canal-telefono.tc-canal-activo  { background: rgba(59,130,246,0.15);  color: #3B82F6; }
  .tc-canal-whatsapp.tc-canal-activo  { background: rgba(37,211,102,0.15);  color: #25D366; }
  .tc-canal-web.tc-canal-activo       { background: rgba(99,102,241,0.15); color: #6366F1; }
  .tc-canal-maps.tc-canal-activo      { background: rgba(234,67,53,0.15);  color: #EA4335; }
  .tc-canal-instagram.tc-canal-activo { background: rgba(228,64,95,0.15);  color: #E4405F; }
  .tc-canal-facebook.tc-canal-activo  { background: rgba(24,119,242,0.15); color: #1877F2; }

  .tc-completitud { margin-top: 22px; }
  .tc-completitud-fila { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .tc-completitud-fila span { font-size: 12px; color: var(--text-secondary); }
  .tc-barra { height: 4px; background: var(--bg-card-alt); border-radius: 4px; overflow: hidden; }
  .tc-barra-relleno { height: 100%; background: var(--accent); border-radius: 4px; }

  .tc-pie { display: flex; align-items: center; justify-content: space-between; margin-top: 22px; }
  .tc-acciones-der { display: flex; align-items: center; gap: 8px; }

  .btn-principal {
    background: var(--accent); border-color: var(--accent); color: #fff;
    font-size: 13px; padding: 8px 16px;
  }
  .btn-icono {
    width: 32px; height: 32px; padding: 0;
    background: transparent; border-color: var(--border);
  }

  .tc-menu-wrap { position: relative; }
  .tc-menu-lista {
    display: none;
    position: absolute; right: 0; bottom: calc(100% + 6px);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px;
    min-width: 150px; z-index: 5;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  }
  .tc-menu-lista.abierto { display: block; }
  .tc-menu-item {
    display: block; width: 100%; text-align: left;
    background: none; border: none; border-radius: 6px;
    padding: 8px 10px; font-size: 13px; color: var(--text-primary);
    cursor: pointer;
  }
  .tc-menu-item:hover { background: var(--bg-card-alt); opacity: 1; }
  .tc-menu-item.peligro { color: var(--danger); }
  .tc-menu-item[disabled] { opacity: 0.45; cursor: not-allowed; }
  .tc-menu-item[disabled]:hover { background: none; }

  @media (max-width: 640px) {
    .stats-header { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .grid-comercios { grid-template-columns: 1fr; }
    .tarjeta-comercio { padding: 20px; }
    .filtros-barra select { flex: 1 1 100%; }
  }
</style>
</head>
<body>

<div id="nav-top"></div>

<div class="container" style="padding-top: 24px;">
  <div class="flex-between" style="margin-bottom: 4px;">
    <h1>Comercios</h1>
    <a href="nuevo.html" class="btn btn-primary">+ Nuevo comercio</a>
  </div>
  <p class="muted">Todos los comercios relevados hasta ahora.</p>

  <div class="stats-header">
    <div class="stat-card">
      <p class="stat-label">Total comercios</p>
      <p class="stat-valor" id="statTotal">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Clientes activos</p>
      <p class="stat-valor" id="statActivos">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Prioridad alta</p>
      <p class="stat-valor" id="statPrioridad">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Sin contactar</p>
      <p class="stat-valor" id="statNuevos">—</p>
    </div>
  </div>

  <div class="filtros-barra">
    <input type="text" id="buscador" placeholder="Buscar por nombre o rubro...">
    <select id="filtroEstado">
      <option value="">Estado</option>
      <option value="Nuevo">Nuevo</option>
      <option value="Contactado">Contactado</option>
      <option value="En seguimiento">En seguimiento</option>
      <option value="Cliente">Cliente</option>
    </select>
    <select id="filtroPrioridad">
      <option value="">Prioridad</option>
      <option value="Alta">Alta</option>
      <option value="Media">Media</option>
      <option value="Baja">Baja</option>
    </select>
    <select id="filtroRubro">
      <option value="">Rubro</option>
    </select>
    <select id="filtroLocalidad">
      <option value="">Localidad</option>
    </select>
    <select id="filtroOrden">
      <option value="">Ordenar por</option>
      <option value="recientes">Más recientes</option>
      <option value="nombre">Nombre (A-Z)</option>
      <option value="prioridad">Prioridad</option>
    </select>
  </div>

  <div id="listaComercios" class="grid-comercios">
    <p class="muted">Cargando...</p>
  </div>
</div>

<div id="nav-bottom"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
  requireAuth('../index.html');
  renderNav('comercios', '../');
</script>
<script src="comercios.js"></script>
</body>
</html>
