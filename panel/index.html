<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel · Eleva Lab</title>
<script>
  (function () {
    const tema = localStorage.getItem('eleva_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<style>
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .stat-card p.label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .stat-card p.valor { font-size: 22px; font-weight: 500; }
  .fila-comercio {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .fila-comercio:last-child { border-bottom: none; }
  .fila-comercio p.nombre { font-size: 14px; }
  .fila-comercio p.detalle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="nav-top"></div>

<div class="container" style="padding-top: 24px;">
  <div class="flex-between" style="margin-bottom: 4px;">
    <h1>Panel</h1>
    <a href="../comercios/nuevo.html" class="btn btn-primary">+ Nuevo comercio</a>
  </div>
  <p class="muted">Resumen general de comercios relevados.</p>

  <div class="stats" id="stats">
    <div class="card stat-card"><p class="label">Comercios</p><p class="valor" id="statTotal">–</p></div>
    <div class="card stat-card"><p class="label">En seguimiento</p><p class="valor" id="statSeguimiento">–</p></div>
    <div class="card stat-card"><p class="label">Clientes</p><p class="valor" id="statClientes">–</p></div>
    <div class="card stat-card"><p class="label">Prioridad alta</p><p class="valor" id="statAlta">–</p></div>
  </div>

  <div class="card">
    <div class="flex-between" style="margin-bottom: 8px;">
      <h3>Comercios recientes</h3>
      <a href="../comercios/index.html">ver todos</a>
    </div>
    <div id="listaRecientes">
      <p class="muted">Cargando...</p>
    </div>
  </div>
</div>

<div id="nav-bottom"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
  requireAuth('../index.html');
  renderNav('panel', '../');
</script>
<script src="panel.js"></script>
</body>
</html>
