<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuestas · Eleva Lab</title>
<script>
  (function () {
    const tema = localStorage.getItem('eleva_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="icon" type="image/png" href="../assets/img/logo.png">
<style>
  /* ── Cabecera de métricas (mismo patrón que Comercios) ─────── */
  .stats-header {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .stat-card { background: var(--bg-card-alt); border-radius: var(--radius); padding: 16px; }
  .stat-card p.stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-card p.stat-valor { font-size: 24px; font-weight: 500; color: var(--text-primary); }

  /* ── Filtros ─────────────────────────────────────────────── */
  .filtros-barra { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .filtros-barra input[type="text"] { flex: 2; min-width: 200px; }
  .filtros-barra select { flex: 1; min-width: 130px; }

  /* ── Tabla ───────────────────────────────────────────────── */
  .tabla-wrap { overflow-x: auto; }
  table.tabla-encuestas { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tabla-encuestas th {
    text-align: left; padding: 10px 12px; color: var(--text-secondary);
    font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .tabla-encuestas td {
    padding: 12px; border-bottom: 1px solid var(--border);
    color: var(--text-primary); vertical-align: middle; white-space: nowrap;
  }
  .tabla-encuestas tr:last-child td { border-bottom: none; }
  .tabla-encuestas tr:hover { background: var(--bg-card-alt); }
  .celda-empresa { font-weight: 500; }
  .celda-muted { color: var(--text-secondary); }

  select.select-estado {
    font-size: 12px; padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg-card-alt); color: var(--text-primary);
  }
  .badge-urgencia-alta  { background: var(--danger-soft);  color: var(--danger); }
  .badge-urgencia-media { background: var(--warning-soft); color: var(--warning); }
  .badge-urgencia-baja  { background: var(--success-soft); color: var(--success); }

  /* ── Drawer lateral de detalle ───────────────────────────── */
  .drawer-fondo {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 20;
  }
  .drawer-fondo.abierto { display: block; }
  .drawer-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 480px; max-width: 92vw;
    background: var(--bg-card); border-left: 1px solid var(--border);
    z-index: 21; overflow-y: auto; padding: 24px;
    transform: translateX(100%); transition: transform 0.2s ease;
  }
  .drawer-fondo.abierto .drawer-panel { transform: translateX(0); }
  .drawer-cabecera { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .drawer-cabecera h2 { font-size: 18px; margin-bottom: 2px; }
  .btn-cerrar-drawer { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }

  .drawer-bloque { margin-bottom: 22px; }
  .drawer-bloque h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--text-secondary); margin-bottom: 10px;
  }
  .drawer-pregunta { margin-bottom: 12px; }
  .drawer-pregunta p.texto { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
  .drawer-pregunta p.respuesta { font-size: 14px; color: var(--text-primary); }

  .drawer-acciones { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }

  @media (max-width: 640px) {
    .stats-header { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="nav-top"></div>

<div class="container" style="padding-top: 24px;">
  <div class="flex-between" style="margin-bottom: 4px;">
    <h1>Encuestas</h1>
    <button type="button" class="btn" id="btnExportarCSV">Exportar CSV</button>
  </div>
  <p class="muted">Respuestas recibidas del Diagnóstico público.</p>

  <div class="stats-header">
    <div class="stat-card">
      <p class="stat-label">Total respuestas</p>
      <p class="stat-valor" id="statTotal">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Nuevas</p>
      <p class="stat-valor" id="statNuevas">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Contactadas</p>
      <p class="stat-valor" id="statContactadas">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Clientes</p>
      <p class="stat-valor" id="statClientes">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Conversión</p>
      <p class="stat-valor" id="statConversion">—</p>
    </div>
  </div>

  <div class="filtros-barra">
    <input type="text" id="buscador" placeholder="Buscar por nombre, empresa o rubro...">
    <select id="filtroEstado">
      <option value="">Estado</option>
      <option value="Nuevo">Nuevo</option>
      <option value="Revisado">Revisado</option>
      <option value="Contactado">Contactado</option>
      <option value="Cliente">Cliente</option>
      <option value="Descartado">Descartado</option>
    </select>
    <select id="filtroProvincia"><option value="">Provincia</option></select>
    <select id="filtroRubro"><option value="">Rubro</option></select>
  </div>

  <div class="card">
    <div class="tabla-wrap">
      <table class="tabla-encuestas">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Nombre</th>
            <th>Empresa</th>
            <th>Contacto</th>
            <th>Provincia</th>
            <th>Rubro</th>
            <th>Diagnóstico</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cuerpoTabla">
          <tr><td colspan="9" class="muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="nav-bottom"></div>

<!-- Drawer de detalle -->
<div class="drawer-fondo" id="drawerFondo">
  <div class="drawer-panel" id="drawerPanel">
    <div class="drawer-cabecera">
      <div>
        <h2 id="drawerNombre">—</h2>
        <p class="muted" id="drawerFecha">—</p>
      </div>
      <button type="button" class="btn-cerrar-drawer" id="btnCerrarDrawer">✕</button>
    </div>
    <div id="drawerContenido"><p class="muted">Cargando...</p></div>
    <div class="drawer-acciones">
      <button type="button" class="btn btn-primary" id="btnCopiarContextoIA">Copiar contexto para IA</button>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
  requireAuth('../index.html');
  renderNav('encuestas', '../');
</script>
<script src="encuestas.js"></script>
</body>
</html>
