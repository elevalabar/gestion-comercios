<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleva Lab</title>
<script>
  // Aplicar tema ANTES de pintar, para que no haya flash de color equivocado
  (function () {
    const guardado = localStorage.getItem('eleva_theme');
    const tema = guardado || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="icon" type="image/png" href="assets/img/logo.png">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-box { width: 100%; max-width: 340px; }
  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-wrap img {
    width: 56px; height: 56px; border-radius: 50%;
    object-fit: cover;
  }
  .logo-wrap img { border-radius: 14px; }
  .logo-wrap span { font-size: 16px; font-weight: 800; letter-spacing: 0.08em; }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px;
  }
</style>
</head>
<body>

  <button class="icon-btn theme-toggle" id="btnTema" title="Cambiar tema" aria-label="Cambiar tema"></button>

  <div class="login-box">
    <div class="logo-wrap">
      <img src="assets/img/logo.png" alt="Eleva Lab">
      <span>ELEVA LAB</span>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 18px;">Iniciar sesión</h2>

      <div class="mensaje-error" id="msgError"></div>

      <form id="formLogin">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" autocomplete="username" required>
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary btn-block" id="btnLogin">Ingresar</button>
      </form>
    </div>
  </div>

<script src="assets/js/api.js"></script>
<script>
  // Si ya hay sesión activa, saltar directo al panel
  if (sessionStorage.getItem('eleva_sesion')) {
    window.location.href = 'panel/index.html';
  }

  // Toggle de tema
  const ICONO_SOL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const ICONO_LUNA = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  const btnTema = document.getElementById('btnTema');
  function actualizarIconoTema() {
    const actual = document.documentElement.getAttribute('data-theme');
    btnTema.innerHTML = actual === 'dark' ? ICONO_SOL : ICONO_LUNA;
  }
  actualizarIconoTema();
  btnTema.addEventListener('click', () => {
    const actual = document.documentElement.getAttribute('data-theme');
    const nuevo = actual === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nuevo);
    localStorage.setItem('eleva_theme', nuevo);
    actualizarIconoTema();
  });

  // Login
  const form = document.getElementById('formLogin');
  const msgError = document.getElementById('msgError');
  const btnLogin = document.getElementById('btnLogin');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msgError.classList.remove('visible');
    btnLogin.disabled = true;
    btnLogin.textContent = 'Ingresando...';

    const usuario = document.getElementById('usuario').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await apiPost('login', { usuario, password });
      if (data.ok) {
        sessionStorage.setItem('eleva_sesion', JSON.stringify(data));
        window.location.href = 'panel/index.html';
      } else {
        msgError.textContent = data.error || 'Usuario o contraseña incorrectos';
        msgError.classList.add('visible');
      }
    } catch (err) {
      msgError.textContent = 'No se pudo conectar con el servidor. Probá de nuevo.';
      msgError.classList.add('visible');
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Ingresar';
    }
  });
</script>
</body>
</html>
