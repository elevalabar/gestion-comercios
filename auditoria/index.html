<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría · Eleva Lab</title>
<script>
  (function () {
    const tema = localStorage.getItem('eleva_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', tema);
  })();
</script>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="icon" type="image/png" href="../assets/img/logo.png">
<style>
  /* ── Colores por área (locales a esta página) ── */
  .area-card { --area-color: var(--accent); }
  .area-card[data-area="Google"]    { --area-color: #e8b23d; }
  .area-card[data-area="Web"]       { --area-color: #4b8ef0; }
  .area-card[data-area="WhatsApp"]  { --area-color: #3ecf8e; }
  .area-card[data-area="Redes"]     { --area-color: #a78bfa; }
  .area-card[data-area="Catalogo"]  { --area-color: #f0954b; }
  .area-card[data-area="Branding"]  { --area-color: #f06ba8; }

  /* ── Encabezado ── */
  .audit-header-top { margin-bottom: 18px; }
  .audit-header-top a { font-size: 13px; }
  .audit-eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .audit-nombre { font-size: 24px; font-weight: 600; margin-bottom: 2px; }
  .audit-rubro { font-size: 13px; color: var(--text-secondary); }

  .audit-progress { margin-top: 20px; }
  .audit-progress-track {
    height: 10px; border-radius: 20px; background: var(--bg-card-alt);
    overflow: hidden; border: 1px solid var(--border);
  }
  .audit-progress-fill {
    height: 100%; width: 0%; border-radius: 20px;
    transition: width .35s cubic-bezier(.4,0,.2,1);
  }
  .audit-progress-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-top: 8px; font-size: 13px; color: var(--text-secondary);
  }
  .audit-progress-meta .pct { font-weight: 600; color: var(--text-primary); }

  /* ── Grid de áreas ── */
  .areas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-top: 28px;
  }

  .area-card {
    padding: 0;
    overflow: hidden;
    transition: box-shadow .2s ease, transform .2s ease;
    animation: aparecer .25s ease both;
  }
  .area-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.18); }

  .area-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, color-mix(in srgb, var(--area-color) 10%, transparent), transparent);
  }
  .area-icon {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    background: color-mix(in srgb, var(--area-color) 18%, transparent);
    flex-shrink: 0;
  }
  .area-card-header h3 {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
  }
  .area-card-header .area-contador {
    margin-left: auto; font-size: 12px; color: var(--text-muted);
  }

  .pregunta-list { padding: 4px 18px 8px; }
  .pregunta-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .pregunta-row:last-child { border-bottom: none; }
  .pregunta-texto { font-size: 13.5px; flex: 1; line-height: 1.4; }

  /* ── Segmented control Sí / No ── */
  .segmented {
    display: flex; flex-shrink: 0;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .seg-btn {
    border: none; border-radius: 0;
    background: var(--bg-card-alt); color: var(--text-secondary);
    padding: 7px 16px; font-size: 12.5px; font-weight: 600;
    min-width: 52px; cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .seg-btn + .seg-btn { border-left: 1px solid var(--border-strong); }
  .seg-btn:hover:not(.activo):not(:disabled) { background: var(--bg-input); }
  .seg-btn.seg-si.activo { background: #1f9d6f; color: #fff; }
  .seg-btn.seg-no.activo { background: #d1503f; color: #fff; }
  .seg-btn:disabled { opacity: .55; cursor: default; }

  /* ── Check de guardado ── */
  .guardado-check {
    font-size: 11px; font-weight: 600; color: var(--success);
    opacity: 0; width: 0; overflow: hidden; white-space: nowrap;
    transition: opacity .25s ease;
  }
  .guardado-check.visible { opacity: 1; width: auto; overflow: visible; }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .area-card, .audit-progress-fill, .seg-btn, .guardado-check { transition: none; animation: none; }
  }

  @media (max-width: 480px) {
    .pregunta-row { flex-wrap: wrap; }
    .guardado-check { width: 100%; order: 3; }
  }
</style>
</head>
<body>

<div id="nav-top"></div>

<div class="container" style="padding-top: 24px; max-width: 980px; padding-bottom: 60px;">

  <div class="audit-header-top flex-between">
    <div class="audit-eyebrow">Auditoría</div>
    <a href="#" id="linkVolver">← volver a la ficha</a>
  </div>

  <div class="audit-nombre" id="nombreComercio">Cargando...</div>
  <div class="audit-rubro" id="rubroComercio"></div>

  <div class="audit-progress">
    <div class="audit-progress-track">
      <div class="audit-progress-fill eleva-gradient" id="relleno"></div>
    </div>
    <div class="audit-progress-meta">
      <span id="textoAvance">0 de 0 respuestas</span>
      <span class="pct" id="textoPorcentaje">0% completado</span>
    </div>
  </div>

  <div id="mensaje" class="mensaje-error" style="margin-top: 16px;"></div>

  <div id="areas" class="areas-grid">
    <p class="muted">Cargando preguntas...</p>
  </div>

  <div class="flex gap-sm" style="margin-top: 28px;">
    <button type="button" class="btn-primary" id="btnFinalizar">Finalizar auditoría y calcular score</button>
  </div>
</div>

<div id="nav-bottom"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
  requireAuth('../index.html');
  renderNav('comercios', '../');
</script>
<script src="auditoria.js"></script>
</body>
</html>
